        // --- FUNZIONI GLOBALI (Spostate in alto per evitare errori di Reference) ---
        function getTodayStr() {
          return new Date().toISOString().split('T')[0];
        }

        function formatDate(dateStr) {
          if (!dateStr) return '';
          try {
            return new Intl.DateTimeFormat('it-IT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(new Date(dateStr));
          } catch (e) {
            return dateStr;
          }
        }

        function calculateStepEndDate(currentStep, startDateStr) {
          if (!startDateStr) return null;
          try {
            const start = new Date(startDateStr);
            const durations = { 1: 7, 2: 21, 3: 14, 4: 14, 5: 7, 6: 28, 7: 28, 8: 999 };
            start.setDate(start.getDate() + (durations[currentStep] || 14));
            return start.toISOString().split('T')[0];
          } catch (e) {
            return null;
          }
        }

        // --- COSTANTI E DATI ---

        const milestonesDef = [

        const EMOZIONI = ['Ansia', 'Noia', 'Tristezza', 'Solitudine', 'Rabbia', 'Soddisfazione', 'Stanchezza'];

        const themes = {

          },

            dark:  { bgMain: '#231E26', bgCard: '#2E2733', bgInput: '#3A3240', textMain: '#EFE8F2', textMuted: '#9F92A3', borderColor: '#483E50', primary: '#B396C2', lightPrimary: '#382B42', borderPrimary: '#523E61', textPrimary: '#CDB4DB', actPrimary: '#D78FA9', actLight: '#47313A', actBorder: '#614350', actText: '#FFC8DD', sleepPrimary: '#6BA8D6', sleepLight: '#223445', sleepBorder: '#35526B', sleepText: '#A2D2FF' }

        // --- APP COMPONENT ---
        function App() {
          const [pin, setPin] = useState(() => {
            const saved = localStorage.getItem('bed-diary-pin');
            return saved === 'disabled' ? null : saved;
          });
          const [isLocked, setIsLocked] = useState(() => localStorage.getItem('bed-diary-pin') && localStorage.getItem('bed-diary-pin') !== 'disabled');
          const [selectedDate, setSelectedDate] = useState(getTodayStr());
          const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('bed-diary-entries') || '[]'));
          const [weeklyReviews, setWeeklyReviews] = useState(() => JSON.parse(localStorage.getItem('bed-diary-reviews') || '[]'));
          const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem('bed-diary-settings') || '{"isDark":false, "theme":"pink", "currentStep": 1, "stepStartDate": null, "pieChartValue": 50}'));
          const [intros, setIntros] = useState(() => JSON.parse(localStorage.getItem('bed-diary-intros') || '{}'));
          const [altActivities, setAltActivities] = useState(() => JSON.parse(localStorage.getItem('bed-diary-alt-activities') || '["Fare una passeggiata", "Ascoltare musica", "Chiamare un\'amica", "Fare un puzzle", "Bagno caldo"]'));
          const [milestonesAchieved, setMilestonesAchieved] = useState(() => JSON.parse(localStorage.getItem('bed-diary-milestones') || '[]'));
          
          const [activeModal, setActiveModal] = useState(null); 
          const [editingIntroStep, setEditingIntroStep] = useState(null);
          const [msToCelebrate, setMsToCelebrate] = useState(null);
          const [bingeToAnalyze, setBingeToAnalyze] = useState(null);
          const [toastMsg, setToastMsg] = useState("");
          const [diaryFilter, setDiaryFilter] = useState('all');

          useEffect(() => {
            localStorage.setItem('bed-diary-entries', JSON.stringify(entries));
            localStorage.setItem('bed-diary-reviews', JSON.stringify(weeklyReviews));
            localStorage.setItem('bed-diary-settings', JSON.stringify(settings));
            localStorage.setItem('bed-diary-intros', JSON.stringify(intros));
            localStorage.setItem('bed-diary-alt-activities', JSON.stringify(altActivities));
            localStorage.setItem('bed-diary-milestones', JSON.stringify(milestonesAchieved));
          }, [entries, weeklyReviews, settings, intros, altActivities, milestonesAchieved]);

          useEffect(() => {
            if (!settings.stepStartDate) {
              setSettings(prev => ({ ...prev, stepStartDate: getTodayStr() }));
            }
          }, [settings.stepStartDate]);

          useEffect(() => {
            if (isLocked) return;
            if (!intros[settings.currentStep] && activeModal === null) {
              setActiveModal('intro');
              return;
            }
            const monitoredDates = [...new Set([...entries.map(e => e.date), ...weeklyReviews.map(r => r.date)])];
            if (monitoredDates.length > 0) {
              const reached = [...milestonesDef].reverse().find(m => monitoredDates.length >= m.target);
              if (reached && !milestonesAchieved.some(m => m.target === reached.target) && activeModal === null) {
                setMsToCelebrate(reached);
                setActiveModal('milestone');
              }
            }
          }, [isLocked, settings.currentStep, intros, entries, weeklyReviews, milestonesAchieved, activeModal]);

          const updateSetting = (key, value) => setSettings(prev => ({ ...prev, [key]: value }));
          
          const showToast = (msg) => {
            setToastMsg(msg);
            setTimeout(() => setToastMsg(""), 3000);
          };

          const getCssVars = () => {
            const t = themes[settings.theme] ? themes[settings.theme][settings.isDark ? 'dark' : 'light'] : themes['pink']['light'];
            return {
              '--bg-main': t.bgMain, '--bg-card': t.bgCard, '--bg-input': t.bgInput,
              '--text-main': t.textMain, '--text-muted': t.textMuted, '--border-color': t.borderColor,
              '--theme-primary': t.primary, '--theme-light': t.lightPrimary, '--theme-border': t.borderPrimary, '--theme-text': t.textPrimary,
              '--activity-primary': t.actPrimary, '--activity-light': t.actLight, '--activity-border': t.actBorder, '--activity-text': t.actText,
              '--sleep-primary': t.sleepPrimary, '--sleep-light': t.sleepLight, '--sleep-border': t.sleepBorder, '--sleep-text': t.sleepText,
              backgroundColor: t.bgMain, color: t.textMain
            };
          };

          const isToday = selectedDate === getTodayStr();
          const dayOfMonth = new Date(selectedDate).getDate() || 1;
          const todayQuote = dailyQuotes[(dayOfMonth - 1) % dailyQuotes.length];

          let filteredEntries = entries.filter(e => e.date === selectedDate);
          const mealsCount = filteredEntries.filter(e => e.type === 'food' && e.isMeal).length;
          const bingesCount = filteredEntries.filter(e => e.type === 'food' && e.lossOfControl).length;

          if (diaryFilter === 'binges') filteredEntries = filteredEntries.filter(e => e.isExcessive || e.lossOfControl);
          else if (diaryFilter === 'urges') filteredEntries = filteredEntries.filter(e => e.hadUrge);
          else if (diaryFilter === 'sleep') filteredEntries = filteredEntries.filter(e => e.type === 'sleep');

          const daysSinceStepStart = settings.stepStartDate ? Math.floor((new Date() - new Date(settings.stepStartDate)) / (1000 * 60 * 60 * 24)) : 0;
          let suggestedStep = null;
          if (settings.currentStep === 1 && daysSinceStepStart >= 7) suggestedStep = 2;
          else if (settings.currentStep === 2 && daysSinceStepStart >= 21) suggestedStep = 3;
          else if (settings.currentStep === 3 && daysSinceStepStart >= 14) suggestedStep = 4;
          else if (settings.currentStep === 4 && daysSinceStepStart >= 14) suggestedStep = 5;
          else if (settings.currentStep === 5 && daysSinceStepStart >= 7) suggestedStep = 6;
          else if (settings.currentStep === 6 && daysSinceStepStart >= 28) suggestedStep = 7;
          else if (settings.currentStep === 7 && daysSinceStepStart >= 28) suggestedStep = 8;

          if (isLocked) {
            return <LockScreen pin={pin} onUnlock={() => setIsLocked(false)} onSetPin={(p) => { setPin(p); localStorage.setItem('bed-diary-pin', p); setIsLocked(false); }} cssVars={getCssVars()} />;

            <div style={getCssVars()} className="min-h-[100dvh] pb-[calc(6rem+env(safe-area-inset-bottom))] transition-colors duration-300 font-sans">

                  <div className="relative -top-6">

                  </div>
                  <button onClick={() => setActiveModal('review')} className="flex flex-col items-center gap-1.5 text-[var(--text-muted)] hover:text-[var(--theme-primary)] p-2"><CheckCircle2 className="w-6 h-6" /><span className="text-[10px] font-bold uppercase tracking-wider">Review</span></button>
                  <button onClick={() => setActiveModal('stats')} className="flex flex-col items-center gap-1.5 text-[var(--text-muted)] hover:text-[var(--theme-primary)] p-2"><Award className="w-6 h-6" /><span className="text-[10px] font-bold uppercase tracking-wider">Meta</span></button>
                </div>
              </nav>

              {activeModal === 'add' ? <AddEntryModal selectedDate={selectedDate} currentStep={settings.currentStep} altActivities={altActivities} onClose={() => setActiveModal(null)} onSave={(e) => { setEntries([...entries, e].sort((a,b)=>a.time.localeCompare(b.time))); setActiveModal(null); showToast("Registrato!"); }} /> : null}
              {activeModal === 'settings' ? <SettingsModal settings={settings} updateSetting={updateSetting} entries={entries} setEntries={setEntries} userPin={pin} removePin={() => setPin(null)} onClose={() => setActiveModal(null)} /> : null}
              {activeModal === 'alt' ? <AltActivitiesModal altActivities={altActivities} setAltActivities={setAltActivities} onClose={() => setActiveModal(null)} /> : null}
              {activeModal === 'review' ? <WeeklyReviewModal selectedDate={selectedDate} currentStep={settings.currentStep} onClose={() => setActiveModal(null)} onSave={(rev) => { setWeeklyReviews([...weeklyReviews, { ...rev, id: Date.now(), date: selectedDate, step: settings.currentStep }]); setActiveModal(null); showToast("Revisione salvata!"); }} /> : null}
              {activeModal === 'stats' ? <StatsModal settings={settings} updateSetting={updateSetting} entries={entries} weeklyReviews={weeklyReviews} intros={intros} milestonesAchieved={milestonesAchieved} onClose={() => setActiveModal(null)} onEditIntro={(step) => { setEditingIntroStep(step); setActiveModal('intro_edit'); }} /> : null}
              {activeModal === 'intro' ? <IntroStepModal step={settings.currentStep} onClose={(ans) => { setIntros({...intros, [settings.currentStep]: {date: getTodayStr(), answers: ans}}); setActiveModal(null); }} /> : null}
              {activeModal === 'intro_edit' ? <IntroStepModal step={editingIntroStep} isEditing={true} initialAnswers={intros[editingIntroStep]?.answers || {}} onClose={(ans) => { setIntros({...intros, [editingIntroStep]: {date: intros[editingIntroStep]?.date || getTodayStr(), answers: ans}}); setActiveModal('stats'); }} onCancel={() => setActiveModal('stats')} /> : null}
              {activeModal === 'milestone' ? <MilestoneModal milestone={msToCelebrate} onClose={(res) => { setMilestonesAchieved([...milestonesAchieved, res]); setActiveModal(null); setMsToCelebrate(null); }} /> : null}
              {activeModal === 'bingeAnalysis' && bingeToAnalyze ? <BingeAnalysisModal entry={bingeToAnalyze} onClose={() => setActiveModal(null)} onSave={(analysis) => { const updated = entries.map(e => e.id === bingeToAnalyze.id ? {...e, analysis} : e); setEntries(updated); setActiveModal(null); showToast("Analisi salvata."); }} /> : null}
            </div>
          );
        }

        // --- SUB-COMPONENTS ---
        function LockScreen({ pin, onUnlock, onSetPin, cssVars }) {
          const [input, setInput] = useState('');
          const [error, setError] = useState(false);
          const handleSubmit = (e) => {
            e.preventDefault();
            if(input.length !== 4) return;
            if(!pin) onSetPin(input);
            else if(pin === input) onUnlock();
            else { setError(true); setInput(''); }
          };
          const handleSkip = () => {
            localStorage.setItem('bed-diary-pin', 'disabled');
            onUnlock();
          };
          return (
            <div style={cssVars} className="fixed inset-0 z-[100] bg-[var(--bg-main)] flex items-center justify-center p-4 min-h-[100dvh]">
              <div className="bg-[var(--bg-card)] p-6 sm:p-8 rounded-[2.5rem] shadow-xl max-w-sm w-full text-center border border-[var(--border-color)]">
                <div className="w-20 h-20 mx-auto bg-[var(--theme-light)] rounded-full flex items-center justify-center mb-6">
                  <Lock className="w-10 h-10 text-[var(--theme-primary)]" />
                </div>
                <h1 className="text-3xl font-serif text-[var(--text-main)] mb-2">Diary</h1>
                <p className="text-[var(--text-muted)] mb-8 text-sm leading-relaxed">{pin ? 'Bentornata/o. Inserisci il PIN per entrare nel tuo spazio.' : 'Imposta un PIN di 4 cifre per proteggere il tuo diario.'}</p>
                <form onSubmit={handleSubmit}>
                  <input type="password" inputMode="numeric" pattern="[0-9]*" maxLength={4} value={input} onChange={e => {setInput(e.target.value.replace(/\D/g,'')); setError(false);}} placeholder="••••" className={`w-full text-center text-[2.5rem] tracking-[0.5em] p-4 bg-[var(--bg-input)] rounded-2xl outline-none border ${error?'border-red-400':'border-[var(--border-color)] focus:ring-2 focus:ring-[var(--theme-primary)]'} text-[var(--text-main)] mb-2 h-20`} />
                  {error ? <p className="text-red-400 text-xs font-bold mt-2 animate-bounce">PIN errato. Riprova.</p> : null}
                  <button type="submit" disabled={input.length!==4} className="w-full mt-6 py-4 bg-[var(--theme-primary)] text-white font-extrabold tracking-widest text-sm rounded-2xl hover:opacity-90 disabled:opacity-50 uppercase shadow-md active:scale-95 transition-all">Entra</button>
                </form>
                {!pin ? (
                  <button onClick={handleSkip} className="mt-6 text-xs font-bold text-[var(--text-muted)] hover:text-[var(--theme-text)] underline decoration-2 underline-offset-4 p-2">Continua senza PIN</button>
                ) : null}
              </div>
            </div>
          );
        }

        function EntryCard({ entry, prevEntry, currentStep, onAnalyze }) {
          const isBinge = entry.lossOfControl;
          const isSleep = entry.type === 'sleep';
          const isAct = entry.type === 'activity';
          
          let bg = isBinge ? 'bg-[var(--theme-light)] border-[var(--theme-border)] shadow-sm' : isSleep ? 'bg-[var(--sleep-light)] border-[var(--sleep-border)]' : isAct ? 'bg-[var(--activity-light)] border-[var(--activity-border)]' : 'bg-[var(--bg-card)] border-[var(--border-color)]';
          let dot = isBinge ? 'bg-[var(--theme-primary)]' : isSleep ? 'bg-[var(--sleep-primary)]' : isAct ? 'bg-[var(--activity-primary)]' : 'bg-[var(--text-muted)] opacity-30';

          let gapWarning = false;
          if (!isAct && !isSleep && prevEntry && !prevEntry.type?.includes('sleep') && !prevEntry.type?.includes('activity')) {
            const t1 = new Date(`2000-01-01T${prevEntry.time}`); const t2 = new Date(`2000-01-01T${entry.time}`);
            if ((t2 - t1) / (1000 * 60 * 60) > 4) gapWarning = true;
          }

          return (
            <div className="relative pl-14 mb-8 z-10 animate-in slide-in-from-bottom-2">
              {gapWarning ? <div className="absolute -top-6 left-12 text-[10px] font-bold text-[var(--theme-primary)] flex items-center gap-1 opacity-70"><AlertCircle className="w-3 h-3" /> Intervallo &gt; 4h</div> : null}
              <div className={`absolute left-[19px] top-4 w-4 h-4 rounded-full ${dot} border-4 border-[var(--bg-main)] shadow-sm`}></div>
              <div className={`border p-5 rounded-[2.2rem] ${bg}`}>
                <div className="flex justify-between items-start mb-4">
                  <span className="text-xs font-black text-[var(--text-main)] bg-[var(--bg-main)]/50 px-2 py-1 rounded-lg">{entry.time}</span>
                  <div className="flex gap-1 flex-wrap justify-end">
                    {entry.isMeal ? <span className="text-[9px] font-bold uppercase bg-white/50 px-2 py-1 rounded-md text-[var(--text-main)]">( PASTO )</span> : null}
                    {isBinge && entry.isExcessive ? <span className="text-[9px] font-bold uppercase bg-red-400 text-white px-2 py-1 rounded-md shadow-sm">Binge O</span> : null}
                    {isBinge && !entry.isExcessive ? <span className="text-[9px] font-bold uppercase bg-red-300 text-white px-2 py-1 rounded-md shadow-sm">Binge S</span> : null}
                    {!isBinge && entry.isExcessive ? <span className="text-[9px] font-bold uppercase bg-[var(--theme-border)] text-[var(--theme-text)] px-2 py-1 rounded-md shadow-sm">Eccesso</span> : null}
                    {isAct && entry.duration ? <span className="text-[9px] font-bold bg-[var(--activity-border)] text-[var(--activity-text)] px-2 py-1 rounded-md">{entry.duration}</span> : null}
                  </div>
                </div>

                <div className="mb-2">
                  <p className="text-lg font-bold text-[var(--text-main)] leading-tight">
                    {isSleep ? (entry.sleepType==='wake'?'Sveglia ☀️':'A letto 🌙') : isAct ? entry.activityName : (entry.isMeal ? `( ${entry.food} )` : entry.food)}
                    {entry.isExcessive ? <span className="text-[var(--theme-primary)] ml-1">***</span> : null}
                  </p>
                  {isSleep ? <p className="text-xs font-bold text-[var(--sleep-text)]/70 mt-1 uppercase">Qualità: {entry.sleepQuality || '-'}/5</p> : null}
                  {!isSleep && !isAct && entry.location ? <p className="text-xs text-[var(--text-muted)] mb-3 italic">📍 {entry.location}</p> : null}
                </div>

                {currentStep >= 3 && entry.hadUrge ? (
                  <div className="mb-4 p-3 bg-white/60 rounded-2xl border border-[var(--theme-border)] text-xs">
                    <p className="font-bold text-[var(--theme-text)] uppercase mb-1">Impulso affrontato</p>
                    <p className="italic text-[var(--text-muted)] whitespace-pre-line">"{entry.urgeBoxContent||'Nessuna nota'}"</p>
                    {entry.altActivityUsed ? <p className="mt-2 font-bold text-[var(--text-main)]">💡 {entry.altActivityUsed}</p> : null}
                  </div>
                ) : null}

                {entry.problemSolving ? (
                  <div className="mb-4 p-3 bg-white rounded-2xl border border-[var(--border-color)] shadow-sm text-xs">
                    <p className="font-bold text-[var(--theme-primary)] uppercase mb-2 flex items-center gap-1"><ListTodo className="w-3 h-3"/> Problem Solving</p>
                    {entry.problemSolving.step1 ? <div><span className="font-bold text-[var(--text-muted)] text-[9px] uppercase">Problema</span><p className="text-[var(--text-main)] italic mb-1">"{entry.problemSolving.step1}"</p></div> : null}
                    {entry.problemSolving.step4 ? <div><span className="font-bold text-[var(--text-muted)] text-[9px] uppercase">Scelta</span><p className="text-[var(--text-main)] italic">"{entry.problemSolving.step4}"</p></div> : null}
                  </div>
                ) : null}

                {isBinge && !entry.analysis ? (
                  <button onClick={onAnalyze} className="w-full py-2 bg-white text-[var(--theme-text)] text-[10px] font-bold uppercase tracking-tighter border border-[var(--theme-border)] rounded-xl hover:bg-[var(--theme-light)] shadow-sm transition-all mb-3 flex justify-center gap-1"><Search className="w-3 h-3"/> Analizza l'episodio</button>
                ) : null}
                {isBinge && entry.analysis ? (
                  <div className="mb-3 p-3 bg-[var(--bg-main)]/40 rounded-xl text-[11px] border border-[var(--theme-border)]">
                    <p className="font-bold text-[var(--theme-text)] mb-1 uppercase">Lezione appresa:</p>
                    <p className="italic text-[var(--text-muted)]">"{entry.analysis.lesson || 'Nessuna'}"</p>
                  </div>
                ) : null}

                {(entry.comments || entry.emotions?.length > 0 || entry.emotionsBefore?.length > 0 || entry.emotionsAfter?.length > 0) ? (
                  <div className="mt-3 pt-3 border-t border-black/5 space-y-2">
                    {entry.emotions?.length > 0 ? <div className="flex flex-wrap gap-1">{entry.emotions.map((e,i)=><span key={i} className="text-[9px] bg-[var(--bg-main)] text-[var(--text-muted)] px-2 py-0.5 rounded-md font-bold uppercase border border-[var(--border-color)]">{e}</span>)}</div> : null}
                    {(entry.emotionsBefore?.length > 0 || entry.emotionsAfter?.length > 0) ? (
                      <div className="flex items-center gap-2">
                        <div className="flex flex-wrap gap-1">{entry.emotionsBefore?.map((e,i)=><span key={i} className="text-[9px] bg-[var(--bg-main)] text-[var(--text-muted)] px-1.5 py-0.5 rounded-md border border-[var(--border-color)]">{e}</span>)}</div>
                        <ArrowRight className="w-3 h-3 text-[var(--activity-primary)]" />
                        <div className="flex flex-wrap gap-1">{entry.emotionsAfter?.map((e,i)=><span key={i} className="text-[9px] bg-[var(--activity-text)] text-white px-1.5 py-0.5 rounded-md">{e}</span>)}</div>
                      </div>
                    ) : null}
                    {entry.comments ? <p className="text-xs italic text-[var(--text-muted)]">"{entry.comments}"</p> : null}
                  </div>
                ) : null}
              </div>
            </div>
          );
        }

        function AddEntryModal({ selectedDate, currentStep, altActivities, onClose, onSave }) {
          const [type, setType] = useState('food');
          const [time, setTime] = useState(() => { const d = new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; });
          const [locDur, setLocDur] = useState('');
          
          const [food, setFood] = useState(''); const [isMeal, setIsMeal] = useState(false); const [isExc, setIsExc] = useState(false); const [lossCtrl, setLossCtrl] = useState(false); const [emotionsFood, setEmotionsFood] = useState([]);
          const [hadUrge, setHadUrge] = useState(false); const [urgeBox, setUrgeBox] = useState(''); const [altUsed, setAltUsed] = useState(''); const [usePs, setUsePs] = useState(false);
          const [ps, setPs] = useState({step1:'', step2:'', step3:'', step4:'', step5:'', step6:''});
          
          const [actName, setActName] = useState(''); const [emBefore, setEmBefore] = useState([]); const [emAfter, setEmAfter] = useState([]);
          const [sleepType, setSleepType] = useState('wake'); const [sleepQ, setSleepQ] = useState('');
          const [comments, setComments] = useState('');

          const [timeLeft, setTimeLeft] = useState(1800);
          const [timerRunning, setTimerRunning] = useState(false);
          
          useEffect(() => {
            let int = null;
            if(timerRunning && timeLeft > 0) int = setInterval(() => setTimeLeft(t => t - 1), 1000);
            else if(timeLeft === 0) setTimerRunning(false);
            return () => clearInterval(int);
          }, [timerRunning, timeLeft]);

          const toggleEmo = (arr, setArr, emo) => { if(arr.includes(emo)) setArr(arr.filter(e=>e!==emo)); else setArr([...arr, emo]); };
          const EmoBtns = ({arr, setArr, colorClass}) => (
            <div className="flex flex-wrap gap-2">
              {EMOZIONI.map(e => {
                const act = arr.includes(e);
                return <button key={e} type="button" onClick={()=>toggleEmo(arr,setArr,e)} className={`px-4 py-2 rounded-full text-xs font-bold border transition-all active:scale-95 ${act ? colorClass+' text-white shadow-sm' : 'bg-[var(--bg-main)] text-[var(--text-muted)] border-[var(--border-color)]'}`}>{e}</button>
              })}
            </div>
          );

          const handleSubmit = (e) => {
            e.preventDefault();
            const base = { id: Date.now(), date: selectedDate, time, comments, type };
            if (type === 'food') {
              if(!hadUrge && !food.trim()) return;
              onSave({ ...base, food, location: locDur, isMeal, isExcessive: isExc, lossOfControl: lossCtrl, emotions: emotionsFood, hadUrge, urgeBoxContent: urgeBox, altActivityUsed: altUsed, problemSolving: usePs ? ps : null });
            } else if (type === 'activity') {
              if(!actName.trim()) return;

        function SettingsModal({ settings, updateSetting, entries, setEntries, userPin, removePin, onClose }) {
          const handleExport = () => {
            const dataStr = JSON.stringify(entries, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href = url; link.download = `diary-bed-backup.json`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
          };
          const handleImport = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { try { const d = JSON.parse(event.target.result); if (Array.isArray(d)) { setEntries(d); onClose(); } } catch (err) { alert("File non valido"); } };
            reader.readAsText(file);
          };
          const endD = calculateStepEndDate(settings.currentStep, settings.stepStartDate);

          return (
            <div className="fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center p-4">
              <div className="bg-[var(--bg-main)] w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl overflow-y-auto max-h-[90vh] modal-enter">
                <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-serif text-[var(--text-main)] flex items-center gap-2"><Settings className="w-6 h-6 text-[var(--theme-primary)]"/> Impostazioni</h2><button onClick={onClose} className="p-2 bg-[var(--bg-input)] text-[var(--text-muted)] rounded-full hover:opacity-80"><X className="w-5 h-5"/></button></div>
                <div className="space-y-6">
                  <div className="bg-[var(--bg-card)] p-5 rounded-3xl border border-[var(--border-color)]">
                    <h3 className="text-sm font-bold text-[var(--text-muted)] uppercase tracking-wider mb-4">Percorso CBT-E</h3>
                    <select value={settings.currentStep} onChange={e=>{updateSetting('currentStep', parseInt(e.target.value)); updateSetting('stepStartDate', getTodayStr());}} className="w-full p-3 bg-[var(--bg-input)] border border-[var(--border-color)] rounded-xl outline-none text-[var(--text-main)] font-bold mb-4">
                      <option value="1">Step 1: Iniziare bene</option><option value="2">Step 2: Mangiare regolare</option><option value="3">Step 3: Alternative</option><option value="4">Step 4: Problem Solving</option><option value="5">Step 5: Fare il bilancio</option><option value="6">Step 6: La Dieta</option><option value="7">Step 7: Immagine Corporea</option><option value="8">Step 8: Prevenzione</option>
                    </select>
                    <div className="p-3 bg-[var(--bg-input)] rounded-xl border border-[var(--border-color)] text-xs text-[var(--text-main)] space-y-1"><p><span className="font-bold">Inizio:</span> {formatDate(settings.stepStartDate)}</p>{endD ? <p><span className="font-bold">Bilancio stimato:</span> {formatDate(endD)}</p> : null}</div>
                  </div>
                  <div className="bg-[var(--bg-card)] p-5 rounded-3xl border border-[var(--border-color)]">
                    <h3 className="text-sm font-bold text-[var(--text-muted)] uppercase tracking-wider mb-4">Sicurezza & Aspetto</h3>
                    <div className="flex items-center justify-between mb-4"><span className="font-bold text-[var(--text-main)] text-sm flex items-center gap-2">{userPin?<Lock className="w-4 h-4 text-[var(--theme-primary)]"/>:<Unlock className="w-4 h-4 text-[var(--text-muted)]"/>} Blocco PIN</span>{userPin ? <button onClick={() => {localStorage.setItem('bed-diary-pin', 'disabled'); removePin();}} className="px-3 py-1.5 bg-red-100 text-red-600 text-[10px] font-bold rounded-lg uppercase active:scale-95">Rimuovi</button> : <span className="text-[10px] text-[var(--text-muted)] uppercase">Non attivo</span>}</div>
                    <div className="flex items-center justify-between mb-4"><span className="font-bold text-[var(--text-main)] text-sm flex items-center gap-2"><Moon className="w-4 h-4"/> Scura</span><button onClick={()=>updateSetting('isDark', !settings.isDark)} className={`w-12 h-6 rounded-full relative transition-colors ${settings.isDark?'bg-[var(--theme-primary)]':'bg-[var(--border-color)]'}`}><div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-transform ${settings.isDark?'translate-x-7':'translate-x-1'}`}></div></button></div>
                    <div className="flex items-center justify-between"><span className="font-bold text-[var(--text-main)] text-sm flex items-center gap-2"><Palette className="w-4 h-4 text-[var(--theme-primary)]"/> Tema</span><div className="flex gap-2">{['pink','aqua','lavender'].map(c => <button key={c} onClick={()=>updateSetting('theme', c)} className={`w-8 h-8 rounded-full border-[3px] transition-all ${settings.theme===c?'scale-110 border-[var(--text-main)]':'border-transparent'}`} style={{backgroundColor: themes[c].light.primary}}></button>)}</div></div>
                  </div>
                  <div className="bg-[var(--bg-card)] p-5 rounded-3xl border border-[var(--border-color)]">
                    <h3 className="text-sm font-bold text-[var(--text-muted)] uppercase tracking-wider mb-4">Dati</h3>
                    <button onClick={handleExport} className="w-full flex items-center justify-center gap-2 bg-[var(--bg-input)] text-[var(--text-main)] py-3 rounded-xl hover:opacity-80 font-bold text-sm mb-3"><Download className="w-4 h-4"/> Esporta Backup</button>

                </div>
              </div>

                  ))}
                </div>
              </div>
            </div>
          );

                  <div><label className="block text-[10px] font-bold text-[var(--text-muted)] uppercase mb-1">1. Innesco</label><textarea value={a.trigger} onChange={e=>setA({...a, trigger:e.target.value})} placeholder="Cosa è successo poco prima?" rows="2" className="w-full p-4 bg-[var(--bg-input)] border border-[var(--border-color)] rounded-xl text-base outline-none focus:ring-2 focus:ring-[var(--theme-primary)]"></textarea></div>
                  <div><label className="block text-[10px] font-bold text-[var(--text-muted)] uppercase mb-1">2. Regole</label><textarea value={a.rule} onChange={e=>setA({...a, rule:e.target.value})} placeholder="Avevi infranto una regola dietetica?" rows="2" className="w-full p-4 bg-[var(--bg-input)] border border-[var(--border-color)] rounded-xl text-base outline-none focus:ring-2 focus:ring-[var(--theme-primary)]"></textarea></div>
                  <div><label className="block text-[10px] font-bold text-[var(--text-muted)] uppercase mb-1">3. Emozioni</label><textarea value={a.emotion} onChange={e=>setA({...a, emotion:e.target.value})} placeholder="Cosa volevi spegnere?" rows="2" className="w-full p-4 bg-[var(--bg-input)] border border-[var(--border-color)] rounded-xl text-base outline-none focus:ring-2 focus:ring-[var(--theme-primary)]"></textarea></div>
                  <div><label className="block text-[10px] font-bold text-[var(--theme-primary)] uppercase mb-1">4. Lezione</label><textarea value={a.lesson} onChange={e=>setA({...a, lesson:e.target.value})} placeholder="Se ricapitasse domani, cosa faresti di diverso?" rows="2" className="w-full p-4 bg-[var(--bg-input)] border border-[var(--border-color)] rounded-xl text-base outline-none focus:ring-2 focus:ring-[var(--theme-primary)]"></textarea></div>
                  <button onClick={()=>onSave(a)} className="w-full mt-4 py-4 bg-[var(--theme-primary)] text-white font-extrabold uppercase text-xs tracking-widest rounded-2xl shadow-md active:scale-95 transition-all">Salva</button>
                </div>
              </div>
            </div>
          );
        }

        // --- RENDER APP ---
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
